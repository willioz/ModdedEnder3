
[stepper_x]
step_pin: PE3
dir_pin: !PE2
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: -20
position_min: -20
position_max: 255
homing_speed: 80
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PD5
diag_pin: ^PA15
driver_SGTHRS:   110
run_current: 0.9
home_current: 0.6
interpolate: True
stealthchop_threshold: 0
sense_resistor: 0.110


[stepper_y]
step_pin: PE0
dir_pin: PB9
enable_pin: !PE1
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: -14
position_min : -14
position_max: 205
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_y]
uart_pin: PD7
diag_pin: ^PD2
driver_SGTHRS: 110
run_current: 1.1
home_current: 0.9
interpolate: True
stealthchop_threshold: 0
sense_resistor: 0.110


[stepper_z]
step_pin: PB5
dir_pin: !PB4
enable_pin: !PB8
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -1

[tmc2209 stepper_z]
uart_pin: PD4
run_current: 0.60
interpolate: True
stealthchop_threshold: 0
sense_resistor: 0.110

[stepper_z1]
step_pin: PD6
dir_pin: PD3
enable_pin: !PB3
microsteps: 16
rotation_distance: 40
gear_ratio: 80:16
full_steps_per_rotation: 200

[tmc2209 stepper_z1]
uart_pin: PD9
run_current: 0.60
interpolate: True
stealthchop_threshold:0
sense_resistor: 0.110