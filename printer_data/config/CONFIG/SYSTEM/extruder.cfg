[extruder]
step_pin:Toolhead:gpio7
dir_pin:Toolhead:gpio6
enable_pin: !Toolhead:gpio14
rotation_distance: 21.84
gear_ratio:50:10
microsteps:16
full_steps_per_rotation: 200   
nozzle_diameter:0.400
filament_diameter:1.75
heater_pin:Toolhead:gpio23
sensor_type: MAX31865
sensor_pin:Toolhead:gpio17
spi_bus: spi0_gpio4_gpio3_gpio2
rtd_reference_r: 4300
rtd_nominal_r: 1000
min_temp:-200
max_temp:350
max_power:1.0
min_extrude_temp:-200
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 800
max_extrude_cross_section: 800
control:pid_v
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114

###------------------------------------------------------------------
[tmc2209 extruder]
uart_pin:Toolhead:gpio15
interpolate:False
run_current: 0.8
sense_resistor:0.110
###------------------------------------------------------------------
[verify_heater extruder]
max_error: 20
check_gain_time:120
hysteresis: 50
heating_gain: 2