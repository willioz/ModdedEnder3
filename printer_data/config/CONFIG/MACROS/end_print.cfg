[gcode_macro END_PRINT]
gcode:
  M400
  G92 E0
  G1 E-2.0 F1800
  {% set z_lift = 10 %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set current_z = printer.toolhead.position.z|float %}
  {% if current_z + z_lift < max_z %}
    G91
    G1 Z{z_lift} F1200
    G90
  {% else %}
    G1 Z{max_z} F1200
  {% endif %}

  G1 X5 Y{printer.toolhead.axis_maximum.y - 5} F9000


  M104 S0
  M140 S0
  M106 S0

  M84 X Y E Z                
