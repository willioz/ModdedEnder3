[gcode_macro START_PRINT]
variable_bed_temp: 60
variable_extruder_temp: 200
gcode:
  {% set BED = params.BED|default(printer["gcode_macro START_PRINT"].bed_temp)|float %}
  {% set EXTRUDER = params.EXTRUDER|default(printer["gcode_macro START_PRINT"].extruder_temp)|float %}
  {% set MATERIAL = params.MATERIAL|default(printer["gcode_macro START_PRINT"].material)|string %}
  {% set min_x = params.PRINT_MIN_X|default(20)|float %}
  {% set max_x = params.PRINT_MAX_X|default(200)|float %}
  {% set min_y = params.PRINT_MIN_Y|default(20)|float %}

  G90                         ; absolute pos\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\itioning
  M83                         ; relative extrusion
  G92 E0

  M117 Heating bed...
  M140 S{BED}
  M190 S{BED}

  M117 Heating nozzle...
  M104 S{EXTRUDER}

  M117 Homing...
  G28

  {% if printer.configfile.settings.z_tilt is defined %}
    M117 Z tilt...
    Z_TILT_ADJUST
    G28 Z
  {% endif %}

  _SET_MPC_MATERIAL MATERIAL={params.MATERIAL}

  BED_MESH_CALIBRATE  METHOD=automatic  ADAPTIVE=1 ADAPTIVE_MARGIN=5

  M117 Waiting nozzle...
  M109 S{EXTRUDER}

  LINE_PURGE

  M117 Printing...